name: Deploy to GitHub Pages

# Publishes a read-only static export of the collection.
# Deploys on push to main (e.g. after merging the PR) or a manual run, so you
# can run/preview locally before anything goes live.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions required by the GitHub Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; cancel superseded runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          # Puppeteer is only used locally (screenshots); the Pages build
          # doesn't need its bundled Chromium.
          PUPPETEER_SKIP_DOWNLOAD: "true"

      - name: Remove server-only routes for the static build
        run: node scripts/prepare-pages.mjs

      - name: Build static export
        run: npm run build
        env:
          NEXT_PUBLIC_STATIC: "true"

      - name: Disable Jekyll processing
        run: touch out/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Turn on GitHub Pages (Actions source) automatically on first run,
          # so no manual Settings → Pages step is needed.
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
